<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Year 5/6 Drama · Finding Your Voice</title>
<style>

  :root{
    --bg0:#140a1e; --bg1:#1e1230; --bg2:#2a1a42;
    --ink:#fcfaf8; --ink-dim:#ddd0ec; --ink-faint:#a89cb8;
    --panel:#2a1a42; --panel2:#342450; --line:#5a4870;
    --chip-bg:#241836;
    --cream:#fef9e7; --cream-ink:#1e2a28;
    --amber:#e8b838; --amber2:#ffe8a0;
    --accent:#9b6fd4; --accent2:#c8a0ff; --teal:#9b6fd4; --mint:#e0c0ff;
    --notice-bg:#efe4ff; --notice-ink:#2a1840; --notice-border:#c8a0ff;
    --p1:#ff5a6e; --p2:#e0c0ff; --p3:#5aa9ff; --p4:#b88bff; --p5:#ffb347;
    --radius:18px;
    --font: "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font);color:var(--ink);background:var(--bg0);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #app{width:100vw;height:100vh;display:flex;flex-direction:column;}
  #stageWrap{flex:1;display:flex;align-items:center;justify-content:center;padding:18px 18px 6px;min-height:0;}
  .slide{position:relative;width:min(1180px,100%);aspect-ratio:16/10;max-height:100%;
    background:radial-gradient(1200px 500px at 80% -10%, rgba(200,160,255,.06), transparent 60%), linear-gradient(160deg,var(--bg1),var(--bg2) 60%, #101c22);
    border:1px solid var(--line);border-radius:26px;box-shadow:0 30px 80px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.04);
    padding:26px 38px 48px;overflow:hidden;display:flex;flex-direction:column;}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;align-self:flex-start;background:rgba(200,160,255,.10);color:var(--accent2);border:1px solid rgba(200,160,255,.28);
    font-weight:800;letter-spacing:.14em;text-transform:uppercase;font-size:12px;padding:7px 14px;border-radius:999px;}
  h1.title{font-size:clamp(28px,3.6vw,46px);line-height:1.02;margin:10px 0 12px;letter-spacing:-.01em;}
  .slide.cover h1.title{font-size:clamp(40px,6vw,76px);}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1;min-height:0;}
  .cols.wide-left{grid-template-columns:1.25fr .9fr;}
  .cols.screen-a{grid-template-columns:1.15fr .92fr;align-items:stretch;}
  .col{display:flex;flex-direction:column;gap:8px;min-height:0;overflow:hidden;}
  .col.left-a .imgframe.hero{flex:1 1 auto;min-height:min(44vh,360px);}
  .col.left-a .hook{flex:0 0 auto;margin-top:auto;}
  .col.right-a .wp{flex:0 0 auto;}
  .col.right-a .brain{flex:1 1 auto;min-height:0;overflow:auto;}
  .col.right-a > .card.cream{margin-top:auto;flex:0 0 auto;}
  .col::-webkit-scrollbar{width:6px;} .col::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}
  .col > .card.cream,
  .col > .steps{flex:0 1 auto;min-height:0;max-height:62%;overflow:auto;}
  .col.left-a > .card.cream{max-height:none;}
  .col > .imgframe, .col > .imgrow{flex:1 1 0;min-height:100px;min-width:0;width:100%;}
  .card{border-radius:var(--radius);padding:20px 22px;}
  .card.cream{background:var(--cream);color:var(--cream-ink);box-shadow:0 10px 30px rgba(0,0,0,.25);overflow:auto;}
  .card.dark{background:var(--panel);border:1px solid var(--line);}
  .tag{display:inline-block;font-weight:900;font-size:12px;letter-spacing:.1em;text-transform:uppercase;background:var(--amber);color:#3a2c00;padding:5px 12px;border-radius:999px;margin-bottom:12px;}
  .tag.read{background:var(--amber)} .tag.wow{background:#ff6b8a;color:#3a0010}
  .tag.do{background:var(--mint);color:#063a2c} .tag.try{background:#ffd766;color:#3a2c00}
  .card h3{font-size:clamp(18px,2vw,24px);margin-bottom:8px;}
  .card.cream p,.card.cream li{font-size:clamp(15px,1.45vw,19px);line-height:1.45;}
  .spell-words{display:flex;flex-wrap:wrap;gap:0 1.75em;margin-top:10px;font-size:17px;line-height:1.45;font-weight:700;color:var(--cream-ink);}
  .spell-words span{white-space:nowrap;}
  .notice{margin-top:12px;background:var(--notice-bg);border-left:5px solid var(--notice-border);color:var(--notice-ink);padding:10px 13px;border-radius:10px;font-size:14.5px;}
  .notice b{color:#2d6b58}
  .hook{background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);padding:10px 15px;}
  .hook .lbl{color:var(--amber2);font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;}
  .hook p{font-size:clamp(15px,1.5vw,20px);margin-top:5px;line-height:1.3;}
  .card.dark.wp{padding:14px 16px;}
  .wp h4{color:var(--ink);font-size:16px;margin-bottom:8px;}
  .wp-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
  .chip{background:var(--chip-bg);border:1px solid var(--line);border-radius:11px;padding:7px 10px;}
  .chip b{display:block;font-size:14.5px;color:var(--mint);}
  .chip span{font-size:12px;color:var(--ink-dim);line-height:1.25;}
  .brain{background:linear-gradient(150deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:var(--radius);padding:12px 16px;}
  .brain .lbl{display:flex;align-items:center;gap:9px;color:var(--amber2);font-weight:800;letter-spacing:.06em;text-transform:uppercase;font-size:12px;margin-bottom:8px;}
  .brain ol{list-style:none;display:flex;flex-direction:column;gap:7px;}
  .brain li{display:flex;gap:10px;font-size:clamp(13.5px,1.35vw,17px);line-height:1.28;}
  .brain .n{flex:none;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-weight:900;font-size:13px;color:#2a1840;background:linear-gradient(135deg,var(--mint),var(--accent));}
  .steps{background:var(--cream);color:var(--cream-ink);border-radius:var(--radius);padding:18px 20px;}
  .steps .tag{margin-bottom:14px}
  .steps .row{display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px dashed #d8cda6;}
  .steps .row:last-child{border-bottom:none}
  .steps .num{flex:none;width:30px;height:30px;border-radius:50%;background:var(--panel2);color:var(--mint);display:grid;place-items:center;font-weight:900;}
  .steps .row b{font-size:18px;display:block;} .steps .row span{font-size:15px;color:#4a5a54;}
  .exit{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;}
  .exit h4{font-size:20px;margin-bottom:12px;}
  .exit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .echk{display:flex;gap:10px;align-items:center;background:var(--chip-bg);border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:14.5px;}
  .echk .bx{flex:none;width:24px;height:24px;border-radius:7px;background:var(--mint);color:#2a1840;display:grid;place-items:center;font-weight:900;}
  .imgframe{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:var(--chip-bg);min-height:100px;}
  .imgframe.hero{min-height:min(44vh,360px);}
  .imgframe img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
  .imgframe.hero img{min-height:min(44vh,360px);}
  .imgframe:not(.hero) img{position:absolute;inset:0;}
  .imgframe.diagram img{object-fit:contain;background:var(--bg0);}
  .imgframe.hero.diagram img{object-fit:contain;min-height:min(44vh,360px);}
  .imgframe.fit img{object-fit:contain;}
  .imgframe .cap{position:absolute;left:0;right:0;bottom:0;z-index:1;background:linear-gradient(transparent,rgba(10,20,25,.92));color:#e8f0ee;font-size:12.5px;padding:18px 12px 8px;font-weight:600;}
  .slide.cover{align-items:flex-start;justify-content:center;text-align:left;}
  .cover .sub{font-size:clamp(18px,2.2vw,26px);color:var(--ink-dim);max-width:760px;line-height:1.4;}
  .cover .meta{margin-top:auto;display:flex;gap:22px;flex-wrap:wrap;color:var(--ink-faint);font-weight:700;letter-spacing:.05em;}
  .cover .pill{background:rgba(200,160,255,.10);border:1px solid rgba(200,160,255,.25);color:var(--mint);padding:8px 16px;border-radius:999px;}
  .slide.divider{justify-content:center;}
  .divider .pkr{font-size:clamp(20px,3vw,30px);color:var(--ink-dim);font-weight:800;letter-spacing:.2em;text-transform:uppercase;}
  .divider h1{font-size:clamp(40px,6vw,72px);margin:10px 0 18px;}
  .divider .goals{display:flex;flex-direction:column;gap:12px;max-width:840px;}
  .divider .goal{display:flex;gap:14px;align-items:center;font-size:clamp(17px,1.9vw,22px);background:var(--panel);border:1px solid var(--line);padding:14px 18px;border-radius:14px;}
  .divider .goal i{flex:none;width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-style:normal;font-weight:900;color:#06251c;}
  .slide.checkpoint{justify-content:center;text-align:center;align-items:center;}
  .checkpoint h1{font-size:clamp(34px,5vw,60px)} .checkpoint p{font-size:clamp(18px,2vw,24px);color:var(--ink-dim);max-width:780px;margin:14px auto 24px;}
  .corner{position:absolute;right:26px;bottom:18px;color:var(--ink-faint);font-size:12px;letter-spacing:.08em;}
  .corner kbd{background:var(--chip-bg);border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-size:11px;}
  .screenlbl{position:absolute;left:38px;bottom:18px;color:var(--ink-faint);font-size:12px;letter-spacing:.12em;text-transform:uppercase;}
  .eyebrow-r{position:absolute;right:38px;top:30px;color:var(--ink-faint);font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;}
  /* Present mode — scale slide to fill viewport (Teams / laptop share) */
  html.presenting body,html:fullscreen body{align-items:stretch;justify-content:stretch;background:var(--bg1);}
  html.presenting #app,html:fullscreen #app{height:100dvh;}
  html.presenting #nav,html:fullscreen #nav{flex-shrink:0;padding:8px 10px;background:var(--bg0);border-top:1px solid var(--line);}
  html.presenting #stageWrap,html:fullscreen #stageWrap{
    padding:0;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden;
    background:var(--bg1);
  }
  html.presenting .slide,html:fullscreen .slide{
    width:1180px;height:738px;max-width:none;max-height:none;aspect-ratio:auto;flex-shrink:0;
    border-radius:0;border:none;box-shadow:none;
    padding:26px 38px 48px;
    transform-origin:center center;
  }
  html.presenting .corner,html.presenting .screenlbl,html:fullscreen .corner,html:fullscreen .screenlbl{display:none;}
  html.presenting .cols,html:fullscreen .cols{flex:1;min-height:0;align-items:stretch;}
  html.presenting .col,html:fullscreen .col{height:100%;}
  html.presenting .col > .card.cream,html.presenting .col > .steps,html.presenting .col > .brain,html.presenting .col > .hook,html.presenting .col > .imgframe,
  html:fullscreen .col > .card.cream,html:fullscreen .col > .steps,html:fullscreen .col > .brain,html:fullscreen .col > .hook,html:fullscreen .col > .imgframe{
    flex:1 1 0;min-height:0;max-height:none;overflow:auto;
  }
  html.presenting .col > .exit,html:fullscreen .col > .exit{flex:0 0 auto;}
  html.presenting .col.left-a .hook,html:fullscreen .col.left-a .hook{margin-top:0;}
  html.presenting .col.right-a > .card.cream,html:fullscreen .col.right-a > .card.cream{margin-top:0;}
  #nav{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px;flex-wrap:wrap;}
  .btn{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:999px;padding:9px 16px;font-weight:700;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;}
  .btn:hover{border-color:var(--mint);color:#fff;}
  .btn.primary{background:var(--mint);color:#2a1840;border-color:var(--mint);}
  .btn.assess{background:linear-gradient(135deg,var(--amber),#ff9d3c);color:#3a2400;border:none;font-weight:900;}
  .btn.inforeport{background:linear-gradient(135deg,#6a9fd4,#e0c0ff);color:#102028;border:none;font-weight:900;}
  .btn.inforeport.hidden{display:none;}
  .btn.notes-open{border-color:var(--mint);color:#fff;box-shadow:0 0 0 1px rgba(200,160,255,.35);}
  #counter{font-weight:800;color:var(--ink-dim);min-width:74px;text-align:center;}
  select#jump{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:999px;padding:9px 12px;font-size:13px;max-width:230px;}
  #tnotes{position:fixed;right:0;top:0;height:100%;width:min(440px,90vw);transform:translateX(100%);transition:transform .28s ease;background:var(--bg1);border-left:1px solid var(--line);z-index:40;box-shadow:-20px 0 60px rgba(0,0,0,.5);display:flex;flex-direction:column;}
  #tnotes.open{transform:none;}
  html.presenting #tnotes,html:fullscreen #tnotes{z-index:100;height:100dvh;}
  #tnotes header{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;}
  #tnotes header b{color:var(--amber2);letter-spacing:.04em;}
  #tnotes header .slide-label{display:block;font-size:12px;font-weight:700;color:var(--ink-faint);letter-spacing:.06em;text-transform:uppercase;margin-top:4px;}
  #tnotes .body{padding:20px;overflow:auto;flex:1;min-height:0;font-size:15.5px;line-height:1.55;color:var(--ink-dim);}
  #tnotes .body h4{color:var(--mint);margin:14px 0 6px;font-size:16px;}
  #tnotes .body ul{margin:6px 0 6px 18px;} #tnotes .body li{margin:4px 0;}
  #overlay{position:fixed;inset:0;background:rgba(8,14,18,.84);backdrop-filter:blur(6px);z-index:60;display:none;align-items:center;justify-content:center;padding:24px;}
  #overlay.open{display:flex;}
  .modal{width:min(1100px,100%);height:min(88vh,820px);background:linear-gradient(160deg,var(--bg1),var(--bg2));border:1px solid var(--line);border-radius:22px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.6);}
  .modal header{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;}
  .modal header h2{font-size:22px;margin-right:auto;}
  .tabs{display:flex;gap:8px;}
  .tab{background:var(--panel2);border:1px solid var(--line);color:var(--ink-dim);padding:8px 16px;border-radius:999px;cursor:pointer;font-weight:700;font-size:14px;}
  .tab.active{background:var(--amber);color:#3a2400;border-color:var(--amber);}
  .modal .content{padding:24px;overflow:auto;flex:1;}
  .modal .content h3{color:var(--mint);margin:18px 0 8px;font-size:20px;}
  .modal .content p,.modal .content li{font-size:16px;line-height:1.55;color:var(--ink);}
  .modal .content ul{margin:6px 0 6px 20px}
  .panelpane{display:none} .panelpane.active{display:block}
  .rubric{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;}
  .rubric th,.rubric td{border:1px solid var(--line);padding:8px;vertical-align:top;text-align:left;}
  .rubric th{background:var(--panel2);color:var(--amber2);}
  .rubric td:first-child{background:var(--chip-bg);color:var(--mint);font-weight:800;width:150px;}
  .rubric .A{background:rgba(200,160,255,.08)}
  .assess-doc .assess-open{margin-bottom:12px;} .assess-doc .assess-open a{color:var(--amber2);font-weight:800;}
  .assess-doc .assess-source{width:100%;height:auto;border-radius:12px;border:1px solid var(--line);background:#fff;}
  .assess-task-meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0 14px;}
  .assess-task-meta .fld{background:var(--chip-bg);border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:13px;}
  .assess-task-meta .fld b{display:block;color:var(--mint);font-size:11px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
  .assess-steps{width:100%;border-collapse:collapse;font-size:13.5px;margin:10px 0;}
  .assess-steps th,.assess-steps td{border:1px solid var(--line);padding:10px 12px;vertical-align:top;text-align:left;}
  .assess-steps th{background:var(--panel2);color:var(--amber2);width:33%;}
  .assess-steps td{color:var(--ink);}
  .assess-due{margin-top:12px;padding:10px 14px;border-radius:10px;background:rgba(245,197,66,.12);border:1px solid rgba(245,197,66,.35);color:var(--amber2);font-weight:800;font-size:15px;}
  .assess-inforeport{margin:14px 0;padding:12px 14px;border-radius:12px;background:rgba(90,169,255,.1);border:1px solid rgba(90,169,255,.35);}
  .assess-inforeport p{margin:0 0 8px;color:var(--ink);font-size:15px;line-height:1.4;}
  #pane-task.active,#pane-reading.active{display:flex;flex-direction:column;min-height:0;flex:1;}
  .assess-pdfFrame{flex:1;min-height:min(68vh,640px);border-radius:14px;overflow:hidden;border:1px solid var(--line);background:var(--bg0);}
  .assess-pdfFrame iframe{width:100%;height:100%;border:0;display:block;min-height:min(68vh,640px);}
  .modal footer{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
  .hint{color:var(--ink-faint);font-size:13px;}
  .slide.overview h1.title{font-size:clamp(24px,3vw,38px);margin-bottom:6px;}
  .slide.overview .sub{font-size:clamp(13px,1.35vw,17px);color:var(--ink-dim);margin-bottom:10px;max-width:920px;line-height:1.4;}
  .overview-wrap{flex:1;min-height:0;overflow:auto;border-radius:var(--radius);border:1px solid var(--line);background:var(--panel);}
  table.unit-map{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.unit-map th,table.unit-map td{border:1px solid var(--line);padding:5px 8px;text-align:left;vertical-align:top;}
  table.unit-map th{background:var(--panel2);color:var(--mint);font-size:11px;letter-spacing:.06em;text-transform:uppercase;position:sticky;top:0;z-index:1;}
  table.unit-map .wk{background:rgba(200,160,255,.12);color:var(--accent2);font-weight:800;font-size:11px;letter-spacing:.08em;text-transform:uppercase;width:54px;}
  table.unit-map .ln{color:var(--amber2);font-weight:800;white-space:nowrap;width:34px;}
  table.unit-map .topic{color:var(--ink);font-weight:700;width:16%;}
  table.unit-map .eng-td{width:34%;padding:5px 8px;}
  table.unit-map .eng-wrap{display:flex;gap:8px;align-items:flex-start;}
  table.unit-map .eng-wrap .blk{flex:1;min-width:0;}
  table.unit-map .eng-wrap b{color:var(--mint);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:3px;}
  table.unit-map .eng-row{display:flex;flex-wrap:wrap;gap:3px 5px;}
  table.unit-map .eng-item{display:inline-block;font-size:10px;line-height:1.25;padding:2px 5px;border-radius:5px;background:var(--chip-bg);border:1px solid var(--line);color:var(--ink-dim);}
  table.unit-map .learn{color:var(--ink-dim);line-height:1.35;width:17%;}
  table.unit-map .rpt{color:var(--ink-faint);font-size:10.5px;line-height:1.3;width:13%;}
  table.unit-map tbody tr:nth-child(even) td:not(.wk){background:rgba(26,38,46,.35);}
  @media (max-width:720px){.cols{grid-template-columns:1fr;overflow:auto;}.wp-grid,.exit-grid{grid-template-columns:1fr;}select#jump{max-width:130px;}}

  .btn.inforeport{background:linear-gradient(135deg,#9b6fd4,#c8a0ff);color:#1a1028;}
  table.unit-map th:nth-child(4){letter-spacing:.04em;}

</style>
</head>
<body>
<div id="app">
  <div id="stageWrap"><div class="slide" id="slide"></div></div>
  <div id="nav">
    <button class="btn" id="prev">← Prev</button>
    <span id="counter">1 / 1</span>
    <select id="jump"></select>
    <button class="btn assess" id="assessBtn">📋 Assessment</button>
    <button class="btn inforeport" id="inforeportBtn" title="Jump to appendices (I)">📎 Appendices</button>
    <button class="btn" id="notesBtn">Teacher notes</button>
    <button class="btn" id="presentBtn" title="Maximise slide for screen share (F · Esc to exit)">⛶ Present</button>
    <button class="btn" id="next">Next →</button>
  </div>
</div>
<aside id="tnotes">
  <header>
    <div><b>Teacher notes</b><span class="slide-label" id="tnotesTitle"></span></div>
    <span>
      <button class="btn" id="detachBtn" type="button">Detach ⧉</button>
      <button class="btn" id="notesClose" type="button">✕</button>
    </span>
  </header>
  <div class="body" id="tnotesBody"></div>
</aside>
<div id="overlay">
  <div class="modal">
    <header>
      <h2>Assessment</h2>
      <div class="tabs">
        <button class="tab active" data-pane="task">Task</button>
        <button class="tab" data-pane="reading">Unit PDF</button>
        <button class="tab" data-pane="guide">Guide</button>

function hook(q){ return `<div class="hook"><div class="lbl">Warm-up — discuss with your teacher</div><p>${q}</p></div>`; }
function bq(arr){
  return `<div class="brain"><div class="lbl">💬 Discussion starters — talk it out</div>
    <ol>${arr.map((q,i)=>`<li><span class="n">${i+1}</span><span>${q}</span></li>`).join('')}</ol></div>`;
}
function wordpower(list){
  return `<div class="card dark wp"><h4>Word Work — Vocabulary</h4><div class="wp-grid">${
    list.map(w=>`<div class="chip"><b>${w.t}</b><span>${w.d}</span></div>`).join('')}</div></div>`;
}
function readCard(r){
  return `<div class="card cream"><span class="tag ${r.wow?'wow':'read'}">${r.label||(r.wow?'WOW · READ':'READ')}</span>
    <h3>${r.heading}</h3>${(r.body||[]).map(p=>`<p style="margin-bottom:10px">${p}</p>`).join('')}
    ${r.notice?`<div class="notice"><b>Notice:</b> ${r.notice}</div>`:''}</div>`;
}
function exitCheck(items){
  return `<div class="exit"><h4>Exit check — I can…</h4><div class="exit-grid">${
    items.map(i=>`<div class="echk"><span class="bx">✓</span><span>${i}</span></div>`).join('')}</div></div>`;
}
function steps(s){
  return `<div class="steps"><span class="tag do">${s.label||'DO THIS'}</span>
    ${s.rows.map((r,i)=>`<div class="row"><div class="num">${i+1}</div><div><b>${r.t}</b><span>${r.d||''}</span></div></div>`).join('')}</div>`;
}
function engItems(s){
  return s.split(' · ').map(x=>`<span class="eng-item">${x}</span>`).join('');
}
function engBlock(a,b){
  return `<div class="eng-wrap">${a?`<div class="blk"><b>A</b><div class="eng-row">${engItems(a)}</div></div>`:''}${b?`<div class="blk"><b>B</b><div class="eng-row">${engItems(b)}</div></div>`:''}</div>`;
}
function progressionTable(rows){
  const counts={};
  rows.forEach(r=>{ counts[r.week]=(counts[r.week]||0)+1; });
  const seen=new Set();
  const body=rows.map(r=>{
    let wk='';
    if(!seen.has(r.week)){ wk=`<td class="wk" rowspan="${counts[r.week]}">Week ${r.week}</td>`; seen.add(r.week); }
    const eng = engBlock(r.englishA||r.english||'', r.englishB||'');
    return `<tr>${wk}<td class="ln">${r.n}</td><td class="topic">${r.topic}</td><td class="eng-td">${eng}</td><td class="learn">${r.learn}</td><td class="rpt">${r.report||''}</td></tr>`;
  }).join('');
  return `<div class="overview-wrap"><table class="unit-map"><thead><tr>
    <th>L</th><th>#</th><th>Focus</th><th>Teach / Do</th><th>You'll learn</th><th>Appendix</th>
  </tr></thead><tbody>${body}</tbody></table></div>`;
}
function renderBlock(b){
  switch(b.k){
    case 'read': return readCard(b);
    case 'hook': return hook(b.q);
    case 'brain': return bq(b.q);
    case 'wp': return wordpower(b.list);
    case 'steps': return steps(b);
    case 'exit': return exitCheck(b.items);
    case 'img': return `<div class="imgframe${b.hero?' hero':''}${b.diagram?' diagram':''}${b.fit?' fit':''}"><img src="${b.src}" alt="${b.alt||''}" loading="lazy" onerror="this.style.opacity='0.3'">${b.cap?`<div class="cap">${b.cap}</div>`:''}</div>`;
    case 'html': return b.html;
    default: return '';
  }
}
function renderSlide(s){
  const el = document.getElementById('slide');
  el.className = 'slide ' + (s.type||'lesson');
  el.style.background = '';
  if(s.type==='cover' && s.bg){
    el.style.background = `linear-gradient(90deg, rgba(20,10,30,.95) 30%, rgba(20,10,30,.45) 70%, rgba(20,10,30,.25)), url('${s.bg}') right center / cover no-repeat`;
  }
  let html='';
  if(s.eyebrowR) html+=`<div class="eyebrow-r">${s.eyebrowR}</div>`;
  if(s.type==='cover'){
    html += `<span class="eyebrow">${s.eyebrow||''}</span><h1 class="title">${s.title}</h1><p class="sub">${s.sub||''}</p>`;
  } else if(s.type==='divider'){
    html += `<div class="pkr">${s.eyebrow||''}</div><h1>${s.title}</h1>
      <div class="goals">${(s.goals||[]).map((g,i)=>`<div class="goal"><i style="background:var(--p${(i%5)+1})">${i+1}</i><span>${g}</span></div>`).join('')}</div>`;
  } else if(s.type==='checkpoint'){
    html += `<span class="eyebrow" style="align-self:center">${s.eyebrow||''}</span><h1>${s.title}</h1><p>${s.sub||''}</p>
      <button class="btn assess" style="padding:14px 26px;font-size:17px" onclick="openOverlay()">📋 Open assessment task</button>`;
  } else if(s.type==='overview'){
    if(s.eyebrow) html+=`<span class="eyebrow">${s.eyebrow}</span>`;
    html += `<h1 class="title">${s.title}</h1>`;
    if(s.sub) html += `<p class="sub">${s.sub}</p>`;
    html += progressionTable(s.rows||[]);
  } else {
    if(s.eyebrow) html+=`<span class="eyebrow">${s.eyebrow}</span>`;
    html += `<h1 class="title">${s.title}</h1>`;
    const isScreenA = (s.eyebrowR||'').includes('Screen A');
    const colClass = isScreenA ? 'cols screen-a wide-left' : `cols ${s.wideLeft?'wide-left':''}`;
    const leftCls = isScreenA ? 'col left-a' : 'col';
    const rightCls = isScreenA ? 'col right-a' : 'col';
    const left = (s.left||[]).map(renderBlock).join('');
    const right = (s.right||[]).map(renderBlock).join('');
    html += `<div class="${colClass}"><div class="${leftCls}">${left}</div><div class="${rightCls}">${right}</div></div>`;
  }
  if(s.screenlbl) html+=`<div class="screenlbl">${s.screenlbl}</div>`;
  html += `<div class="corner"><kbd>T</kbd> notes · <kbd>D</kbd> detach · <kbd>A</kbd> assessment · <kbd>I</kbd> appendices</div>`;
  el.innerHTML = html;
}
let idx = 0;
function syncInfoReportBtn(){
  const btn = document.getElementById('inforeportBtn');
  if(!btn) return;
  btn.textContent = '📎 Appendices';
  btn.title = 'Jump to on-screen appendices (I)';
}
function show(i){
  idx = Math.max(0, Math.min(SLIDES.length-1, i));
  renderSlide(SLIDES[idx]);
  document.getElementById('counter').textContent = `${idx+1} / ${SLIDES.length}`;
  document.getElementById('jump').value = idx;
  if(document.getElementById('tnotes').classList.contains('open')) fillNotes();
  syncInfoReportBtn();
  updatePresentScale();
}
function buildJump(){
  const sel=document.getElementById('jump'); sel.innerHTML='';
  SLIDES.forEach((s,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=`${i+1}. ${s.nav||s.title||('Slide '+(i+1))}`; sel.appendChild(o); });
}
function fillNotes(){
  const s=SLIDES[idx];
  document.getElementById('tnotesTitle').textContent=s.nav||s.title||`Slide ${idx+1}`;
  document.getElementById('tnotesBody').innerHTML=(typeof TEACHER_NOTES!=='undefined'&&TEACHER_NOTES[s.nav])||s.notes||'<p>No notes for this screen.</p>';
}
function openNotes(){ document.getElementById('tnotes').classList.add('open'); document.getElementById('notesBtn').classList.add('notes-open'); fillNotes(); }
function closeNotes(){ document.getElementById('tnotes').classList.remove('open'); document.getElementById('notesBtn').classList.remove('notes-open'); }
function detachNotes(){
  const s=SLIDES[idx];
  const w=window.open('','tnotes','width=460,height=760');
  w.document.write(`<title>Teacher Notes — ${s.nav||s.title}</title><style>body{font-family:system-ui;background:#0f1c24;color:#b4c2c6;line-height:1.6;padding:22px;}h2{color:#ffe082}h4{color:#7ec4b4;margin:14px 0 4px}ul{margin-left:18px}li{margin:4px 0}</style><h2>${s.nav||s.title}</h2>${(typeof TEACHER_NOTES!=='undefined'&&TEACHER_NOTES[s.nav])||s.notes||'<p>No notes.</p>'}`);
  w.document.close();
}
let savedIdxForOverlay=null;
function switchAssessTab(pane){
  document.querySelectorAll('#overlay .tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('#overlay .panelpane').forEach(x=>x.classList.remove('active'));
  document.querySelector(`#overlay .tab[data-pane="${pane}"]`)?.classList.add('active');
  document.getElementById('pane-'+pane)?.classList.add('active');
}
function openOverlay(forcedPane){
  savedIdxForOverlay=idx;
  const slide = SLIDES[idx];
  const pane = (typeof forcedPane === 'string' && forcedPane) || slide?.assessTab || ASSESS_TAB_BY_NAV[slide?.nav] || 'task';
  switchAssessTab(pane);
  document.getElementById('overlay').classList.add('open');
}
function closeOverlay(){ document.getElementById('overlay').classList.remove('open'); if(savedIdxForOverlay!=null) show(savedIdxForOverlay); }
function openInfoReport(){
  const i = SLIDES.findIndex(s => (s.nav||'').startsWith('App A'));
  if(i >= 0) show(i);
}
document.getElementById('prev').onclick=()=>show(idx-1);
document.getElementById('next').onclick=()=>show(idx+1);
document.getElementById('jump').onchange=e=>show(+e.target.value);
document.getElementById('notesBtn').onclick=openNotes;
document.getElementById('notesClose').onclick=closeNotes;
document.getElementById('detachBtn').onclick=detachNotes;
document.getElementById('assessBtn').onclick=()=>openOverlay();
document.getElementById('inforeportBtn').onclick=openInfoReport;
const _backBtn=document.getElementById('backBtn'); if(_backBtn) _backBtn.onclick=closeOverlay;
function isPresenting(){
  return document.documentElement.classList.contains('presenting')
    || document.fullscreenElement || document.webkitFullscreenElement;
}
function setPresenting(on){ document.documentElement.classList.toggle('presenting', on); syncPresentBtn(); updatePresentScale(); }
function updatePresentScale(){
  const slide=document.getElementById('slide');
  if(!isPresenting()){ slide.style.transform=''; return; }
  const wrap=document.getElementById('stageWrap');
  const scale=Math.min(wrap.clientWidth/1180, wrap.clientHeight/738);
  slide.style.transform=`scale(${scale})`;
}
function togglePresent(){
  if(isPresenting()){
    setPresenting(false);
    if(document.fullscreenElement||document.webkitFullscreenElement)
      (document.exitFullscreen||document.webkitExitFullscreen||document.msExitFullscreen)?.call(document);
  } else {
    setPresenting(true);
    const el=document.documentElement;
    const req=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen;
    if(req) req.call(el).catch(()=>{});
  }
}
function syncPresentBtn(){
  document.getElementById('presentBtn').textContent = isPresenting() ? '⤢ Exit' : '⛶ Present';
}
function onFullscreenChange(){
  if(!document.fullscreenElement&&!document.webkitFullscreenElement)
    document.documentElement.classList.remove('presenting');
  syncPresentBtn();
  updatePresentScale();
}
document.getElementById('presentBtn').onclick=togglePresent;
document.addEventListener('fullscreenchange',onFullscreenChange);
document.addEventListener('webkitfullscreenchange',onFullscreenChange);
window.addEventListener('resize',updatePresentScale);
document.querySelectorAll('#overlay .tab').forEach(t=>t.onclick=()=>switchAssessTab(t.dataset.pane));
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='SELECT') return;
  if(e.key==='ArrowRight') show(idx+1);
  else if(e.key==='ArrowLeft') show(idx-1);
  else if(e.key.toLowerCase()==='t'){ document.getElementById('tnotes').classList.contains('open')?closeNotes():openNotes(); }
  else if(e.key.toLowerCase()==='d') detachNotes();
  else if(e.key.toLowerCase()==='a'){ document.getElementById('overlay').classList.contains('open')?closeOverlay():openOverlay(); }
  else if(e.key.toLowerCase()==='i') openInfoReport();
  else if(e.key.toLowerCase()==='f') togglePresent();
  else if(e.key==='Escape'){
    if(document.getElementById('tnotes').classList.contains('open')){ closeNotes(); return; }
    if(isPresenting()){ togglePresent(); return; }
    closeOverlay();
  }
});
document.getElementById('pane-task').innerHTML = ASSESS_TASK;
document.getElementById('pane-reading').innerHTML = ASSESS_READING;
document.getElementById('pane-guide').innerHTML = ASSESS_GUIDE;
buildJump(); show(0);


document.getElementById('overlayClose').onclick = closeOverlay;
syncInfoReportBtn();

</script>
